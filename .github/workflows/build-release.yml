# Git-Sync Build Configuration
name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: amd64
          - os: windows-latest
            platform: windows
            arch: amd64

    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Build executable (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        # Set platform-specific name
        export EXECUTABLE_NAME="git-sync-${{ matrix.platform }}-${{ matrix.arch }}"
        
        # Update spec file with correct name
        sed -i "s/name='git-sync'/name='$EXECUTABLE_NAME'/" config/git-sync.spec
        
        # Build using our spec file
        pyinstaller config/git-sync.spec --clean
        
        # Restore spec file
        sed -i "s/name='$EXECUTABLE_NAME'/name='git-sync'/" config/git-sync.spec
        
        # Test the executable
        ./dist/$EXECUTABLE_NAME --help
    
    - name: Build executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # Set platform-specific name (without .exe for PyInstaller)
        $env:BASE_NAME = "git-sync-${{ matrix.platform }}-${{ matrix.arch }}"
        $env:EXECUTABLE_NAME = "$env:BASE_NAME.exe"
        
        # Update spec file with correct name (without .exe)
        (Get-Content config/git-sync.spec) -replace "name='git-sync'", "name='$env:BASE_NAME'" | Set-Content config/git-sync.spec
        
        # Build using our spec file
        pyinstaller config/git-sync.spec --clean
        
        # Restore spec file
        (Get-Content config/git-sync.spec) -replace "name='$env:BASE_NAME'", "name='git-sync'" | Set-Content config/git-sync.spec
        
        # Test the executable
        ./dist/$env:EXECUTABLE_NAME --help
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: git-sync-${{ matrix.platform }}-${{ matrix.arch }}
        path: dist/git-sync-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/git-sync-*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
