# Git-Sync Build Configuration
name: Build and Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: amd64
          - os: macos-latest
            platform: darwin
            arch: amd64
          - os: windows-latest
            platform: windows
            arch: amd64

    runs-on: ${{ matrix.os }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
    
    - name: Debug environment
      run: |
        echo "Current directory: $(pwd)"
        echo "Directory contents:"
        ls -la
        echo "Python version:"
        python --version
        echo "PyInstaller version:"
        pyinstaller --version
        echo "Checking required files:"
        ls -la cli.py chunks/ utils/ config/
    
    - name: Build executable (Unix)
      if: matrix.os != 'windows-latest'
      run: |
        # Set platform-specific name
        export EXECUTABLE_NAME="git-sync-${{ matrix.platform }}-${{ matrix.arch }}"
        
        # Create a temporary spec file with correct paths
        sed "s|../cli.py|cli.py|g; s|../chunks|chunks|g; s|../utils|utils|g; s|name='git-sync'|name='$EXECUTABLE_NAME'|g" config/git-sync.spec > temp-build.spec
        
        # Build using our temporary spec file
        pyinstaller temp-build.spec --clean
        
        # Clean up temporary file
        rm temp-build.spec
        
        # Test the executable
        ./dist/$EXECUTABLE_NAME --help
    
    - name: Build executable (Windows)
      if: matrix.os == 'windows-latest'
      run: |
        # Set platform-specific name (without .exe for PyInstaller)
        $env:BASE_NAME = "git-sync-${{ matrix.platform }}-${{ matrix.arch }}"
        $env:EXECUTABLE_NAME = "$env:BASE_NAME.exe"
        
        # Create a temporary spec file with correct paths
        (Get-Content config/git-sync.spec) -replace '\.\./cli\.py', 'cli.py' -replace '\.\./chunks', 'chunks' -replace '\.\./utils', 'utils' -replace "name='git-sync'", "name='$env:BASE_NAME'" | Set-Content temp-build.spec
        
        # Build using our temporary spec file
        pyinstaller temp-build.spec --clean
        
        # Clean up temporary file
        Remove-Item temp-build.spec
        
        # Test the executable
        ./dist/$env:EXECUTABLE_NAME --help
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: git-sync-${{ matrix.platform }}-${{ matrix.arch }}
        path: dist/git-sync-*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v3
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/git-sync-*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
